{% extends "base.html" %}

{% block title %}Attendance Analytics{% endblock %}

{% block content %}
<div class="card card-wide">
  <div class="two-col">

    <!-- Left Illustration -->
    <div class="col-illustration">
      <img src="{{ url_for('static', filename='pie-chart.gif') }}" alt="Analytics"
           class="animate-bounce-slow" />
    </div>

    <!-- Right Form -->
    <div class="col-form">
      <h1 class="card-title"><i class="fa-solid fa-chart-column"></i> Attendance Analytics</h1>

      <form method="POST" action="/view_analytics">
        <div class="form-group">
          <label class="form-label"><i class="fa-solid fa-folder"></i> Batch Name</label>
          <input type="text" name="batch" required class="form-control" placeholder="e.g. BatchA" />
        </div>

        <div class="form-group">
          <label class="form-label"><i class="fa-solid fa-calendar-days"></i> Month (1–12)</label>
          <input type="number" name="month" min="1" max="12" required class="form-control" placeholder="e.g. 5" />
        </div>

        <div class="form-group">
          <label class="form-label"><i class="fa-solid fa-chart-line"></i> Analysis Type</label>
          <div class="radio-group mt-1">
            <label class="radio-option">
              <input type="radio" name="choice" value="1" onclick="toggleSubjectField()" checked />
              Single Subject
            </label>
            <label class="radio-option">
              <input type="radio" name="choice" value="2" onclick="toggleSubjectField()" />
              All Subjects
            </label>
          </div>
        </div>

        <div class="form-group" id="subject-input">
          <label class="form-label"><i class="fa-solid fa-book"></i> Subject Name</label>
          <input type="text" name="subject" class="form-control" placeholder="e.g. Math" />
        </div>

        <div class="btn-group">
          <button type="submit" class="btn btn-primary">
            <i class="fa-solid fa-magnifying-glass"></i> View Report
          </button>
          <a href="/" class="btn btn-outline">
            <i class="fa-solid fa-house"></i> Home
          </a>
        </div>
      </form>
    </div>

  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
  function toggleSubjectField() {
    var choice = document.querySelector('input[name="choice"]:checked').value;
    document.getElementById('subject-input').style.display = (choice === '1') ? 'block' : 'none';
  }
</script>
{% endblock %}
